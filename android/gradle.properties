org.gradle.jvmargs=-Xmx6G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Build optimization
org.gradle.caching=true
org.gradle.parallel=true
org.gradle.workers.max=4

# Network timeout (30 seconds)
systemProp.https.proxyHost=

systemProp.http.proxyHost=

# Timeout values (in milliseconds)
org.gradle.internal.http.connectionTimeout=120000
org.gradle.internal.http.socketTimeout=120000

# Prevent daemon from running indefinitely
org.gradle.daemon=true
org.gradle.daemon.idletimeout=60000

# Android SDK tools
android.sdkRoot=C:\\Android\\sdk
android.buildToolsVersion=35.0.0
cmake.dir=C:\\Android\\sdk\\cmake\\4.1.2

# Disable automatic SDK component installation and force offline
org.gradle.offline=true
android.builder.sdkDownload=false
